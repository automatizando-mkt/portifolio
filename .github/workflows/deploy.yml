name: Deploy → automatizando.site

on:
  push:
    branches:
      - master
    paths:
      - 'portfolio/**'

jobs:
  build-and-deploy:
    name: Build e Deploy (FTP)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portfolio/package-lock.json

      - name: Instalar dependências
        working-directory: portfolio
        run: npm ci

      - name: Build estático
        working-directory: portfolio
        run: npm run build

      - name: Adicionar entrada DNS para FTP
        run: echo "147.93.39.4 ftp.automatizando.site" | sudo tee -a /etc/hosts

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.automatizando.site
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: portfolio/out/
          server-dir: /
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
